<!--
  Liste der Social-Links. @for laeuft ueber das links()-Signal,
  @switch waehlt pro Eintrag das passende SVG-Icon.
  [class.is-horizontal] schaltet die waagerechte Anordnung ueber den Input.
-->
<ul class="socials" [class.is-horizontal]="orientation() === 'horizontal'">
  @for (link of links(); track link.href) {
    <li>
      <a [href]="link.href" [attr.aria-label]="link.label" target="_blank" rel="noopener">
        @switch (link.icon) {
          @case ('github') {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 5 18 5.3 18 5.3c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.5-2.7 5.5-5.3 5.8.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5Z" />
            </svg>
          }
          @case ('mail') {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm9 7.5 8-5.3V6H4v1.2l8 5.3Zm0 2-8-5.3V18h16V9.2l-8 5.3Z" />
            </svg>
          }
          @case ('linkedin') {
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5ZM3 9h4v12H3V9Zm6 0h3.8v1.6h.1c.5-1 1.8-2 3.7-2 4 0 4.7 2.6 4.7 6V21h-4v-5.3c0-1.3 0-2.9-1.8-2.9s-2 1.4-2 2.8V21H9V9Z" />
            </svg>
          }
        }
      </a>
    </li>
  }
</ul>
