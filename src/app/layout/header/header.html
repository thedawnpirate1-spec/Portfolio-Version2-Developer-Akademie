<!--
  Sticky Header. [class.is-scrolled] wird true, sobald man scrollt
  (siehe header.ts) -> dann blendet SCSS Hintergrund + Schatten ein.
  Die Nav-Links sind normale Anker auf Sektions-IDs; das globale
  scroll-behavior: smooth (styles.scss) sorgt fuer das weiche Scrollen.
-->
<header class="header" [class.is-scrolled]="scrolled()">
  <div class="header__inner container">
    <a class="header__logo" href="#home" aria-label="Zum Seitenanfang">
      {{ name }}<span>.</span>
    </a>

    <nav class="header__nav" aria-label="Hauptnavigation">
      <a href="#about">About me</a>
      <a href="#skills">Skill set</a>
      <a href="#work">My work</a>
    </nav>
  </div>
</header>
