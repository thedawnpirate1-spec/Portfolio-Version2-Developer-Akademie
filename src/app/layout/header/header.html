<header class="header" [class.is-scrolled]="scrolled()" [class.is-menu-open]="menuOpen()">
  <div class="header__inner container">
    <a class="header__logo" routerLink="/" fragment="home" aria-label="Zum Seitenanfang" (click)="closeMenu()">
      {{ name }}<span>.</span>
    </a>

    <button class="header__burger" aria-label="Menü umschalten" (click)="toggleMenu()">
      <span></span><span></span><span></span>
    </button>

    <div class="header__right">
      <nav class="header__nav" aria-label="Hauptnavigation">
        <a routerLink="/" fragment="about" (click)="closeMenu()">{{ ts.t('NAV_ABOUT') }}</a>
        <a routerLink="/" fragment="skills" (click)="closeMenu()">{{ ts.t('NAV_SKILLS') }}</a>
        <a routerLink="/" fragment="work" (click)="closeMenu()">{{ ts.t('NAV_WORK') }}</a>
      </nav>

      <div class="header__lang" aria-label="Sprache wählen">
        <button type="button" (click)="ts.setLanguage('DE')" [class.is-active]="ts.currentLang() === 'DE'" [attr.aria-current]="ts.currentLang() === 'DE' ? 'true' : null">DE</button>
        <span>/</span>
        <button type="button" (click)="ts.setLanguage('EN')" [class.is-active]="ts.currentLang() === 'EN'" [attr.aria-current]="ts.currentLang() === 'EN' ? 'true' : null">EN</button>
      </div>
    </div>
  </div>
</header>
