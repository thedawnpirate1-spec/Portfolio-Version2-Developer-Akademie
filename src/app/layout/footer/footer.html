<footer class="footer">
  <div class="footer__inner container">
    <a class="footer__logo" href="#home">{{ name }}<span>.</span></a>

    <p class="footer__copy">© {{ name }} {{ year }}</p>

    <!-- gleiche Komponente wie im Hero, hier aber waagerecht -->
    <app-social-links orientation="horizontal" />

    <!-- (click) ruft die Methode aus footer.ts auf -->
    <button class="footer__top" type="button" (click)="scrollToTop()" aria-label="Nach oben scrollen">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 8l-6 6 1.4 1.4L12 10.8l4.6 4.6L18 14z" fill="currentColor" />
      </svg>
    </button>
  </div>
</footer>
