<footer class="footer">
  <div class="footer__inner container">
    <div class="footer__row">
      <a class="footer__logo" href="#home">{{ name }}<span>.</span></a>

      <p class="footer__copy">© {{ name }} {{ year }}</p>

      <!-- gleiche Komponente wie im Hero, hier waagerecht -->
      <app-social-links orientation="horizontal" />
    </div>

    <!-- Pflicht-Seiten in DE (echte Routen) -->
    <nav class="footer__legalnav" aria-label="Rechtliches">
      <a class="footer__legal" routerLink="/impressum">Legal Notice</a>
      <a class="footer__legal" routerLink="/datenschutz">Datenschutz</a>
    </nav>

    <button class="footer__top" type="button" (click)="scrollToTop()" aria-label="Nach oben scrollen">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 8l-6 6 1.4 1.4L12 10.8l4.6 4.6L18 14z" fill="currentColor" />
      </svg>
    </button>
  </div>
</footer>
