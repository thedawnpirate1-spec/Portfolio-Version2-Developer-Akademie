<footer class="footer">
  <div class="footer__inner container">
    <a class="footer__logo" href="#home">{{ name }}<span>.</span></a>

    <p class="footer__copy">© {{ name }} {{ year }}</p>

    <!-- gleiche Komponente wie im Hero, hier waagerecht -->
    <app-social-links orientation="horizontal" />

    <!-- Pflicht-Seiten in DE (echte Routen). Datenschutz wird über die
         Privacy-Policy-Verlinkung im Kontaktformular erreicht. -->
    <nav class="footer__legalnav" aria-label="Rechtliches">
      <a class="footer__legal" routerLink="/impressum">{{ ts.t('FOOTER_LEGAL') }}</a>
    </nav>
  </div>
</footer>
