<!--
  References-Sektion „Need a teamplayer?" auf blauem Verlaufs-Hintergrund.
  Drei Testimonial-Karten (Name, Projekt, Zitat). Inhalte = Platzhalter,
  durch echte Referenzen ersetzen (siehe REFERENCES in profile.ts).
-->
<section class="references" id="references">
  <div class="container">
    <h2 class="references__title" appReveal>Need a teamplayer?</h2>
    <p class="references__subtitle" appReveal>Here is what my colleagues say about me.</p>

    <div class="references__grid" appReveal>
      @for (ref of references; track ref.name + ref.project) {
        <figure class="references__card">
          <figcaption>
            <span class="references__name">{{ ref.name }}</span>
            <span class="references__project">{{ ref.project }}</span>
          </figcaption>
          <blockquote class="references__quote">{{ ref.quote }}</blockquote>
        </figure>
      }
    </div>
  </div>
</section>
