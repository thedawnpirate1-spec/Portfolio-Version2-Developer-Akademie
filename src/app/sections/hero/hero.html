<!--
  Hero-Sektion (Version 2). Aufbau nach Figma:
   - Foto links, dahinter ein grosser blauer Kreis
   - Text rechts: "Hello! I am <Name>" (Montserrat) + "FRONTEND DEVELOPER" (Baloo 2)
   - SCROLL-Indikator (Label + Linie mit laufendem Punkt)
   - Social-Icons senkrecht an der rechten Kante
  reveal-1..4 = gestaffeltes Einblenden (siehe hero.scss).
-->
<section class="hero" id="home">
  <!-- grosser blauer Ball: oben links, laeuft aus dem Bild; Person steht davor -->
  <span class="hero__circle" aria-hidden="true"></span>

  <!-- Mobile-Bubbles (Figma 05_Version 2 - Mobile, Ellipse 5/6 = 304:975/976) -->
  <span class="hero__bubble hero__bubble--1" aria-hidden="true"></span>
  <span class="hero__bubble hero__bubble--2" aria-hidden="true"></span>

  <div class="hero__inner container">
    <div class="hero__photo reveal-1">
      <img src="assets/images/profil-cutout.png" alt="Profilfoto von {{ name }}" />
    </div>
    <div class="hero__text">
      <p class="hero__greeting reveal-2">{{ ts.t('HERO_GREETING') }} {{ firstName }}</p>
      <h1 class="hero__title reveal-3">
        <span>{{ ts.t('HERO_TITLE_1') }}</span>
        <span>{{ ts.t('HERO_TITLE_2') }}</span>
      </h1>
    </div>

    <div class="hero__scroll reveal-4" aria-hidden="true">
      <span class="hero__scroll-label">{{ ts.t('HERO_SCROLL') }}</span>
      <span class="hero__scroll-line"><span class="hero__scroll-dot"></span></span>
    </div>

    <div class="hero__socials reveal-4">
      <app-social-links orientation="vertical" />
    </div>
  </div>
</section>
