<!--
  My-Work-Sektion. Projektkarten wechseln links/rechts (i % 2).
  Jede Karte: Screenshot + Titel (Baloo) + Tech (Montserrat) + Beschreibung +
  Buttons (optional "Live test" gefuellt, "Github" umrandet).
  @for mit $index steuert das Abwechseln; appReveal blendet jede Karte beim
  Hereinscrollen ein.
-->
<section class="work" id="work">
  <!-- dekorative Kreise (Figma E7,E8,E4,E10,E11p,E12 — solid #5988FF, hinter dem Content) -->
  <div class="work__deco" aria-hidden="true">
    <span class="deco-circle work__c--e7"></span>
    <span class="deco-circle work__c--e8"></span>
    <span class="deco-circle work__c--e4"></span>
    <span class="deco-circle work__c--e10"></span>
    <span class="deco-circle work__c--e11"></span>
    <span class="deco-circle work__c--e12"></span>
  </div>

  <div class="container">
    <h2 class="work__title" appReveal>My work</h2>
    <p class="work__intro" appReveal>
      Eine Auswahl meiner Projekte — interagiere mit ihnen und sieh meine Skills in Aktion.
    </p>

    <div class="work__list">
      @for (project of projects; track project.title; let i = $index) {
        <article class="work__card" [class.work__card--reverse]="i % 2 === 1" appReveal>
          <div class="work__image">
            <img [src]="project.image" [alt]="project.title + ' Screenshot'" />
          </div>

          <div class="work__info">
            <h3 class="work__name">{{ project.title }}</h3>
            <p class="work__tech">{{ project.tech }}</p>
            <p class="work__desc">{{ project.description }}</p>

            <div class="work__buttons">
              @if (project.live) {
                <a class="btn-secondary" [href]="project.live" target="_blank" rel="noopener">Live test</a>
              }
              @if (project.github) {
                <a class="btn-primary" [href]="project.github" target="_blank" rel="noopener">Github</a>
              }
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</section>
